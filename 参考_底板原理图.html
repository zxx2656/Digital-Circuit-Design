  <line x1="240" y1="74" x2="530" y2="80" stroke="#333" stroke-width="1.5"/>
  <!-- arrow to P1:1 -->

  <line x1="70" y1="135" x2="90" y2="135" stroke="#666" stroke-width="2"/>
